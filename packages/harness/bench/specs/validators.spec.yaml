id: SPEC-validators
name: Validators
version: 1
layer: quality
description: >
  PostToolUse 훅으로 파일 변경 감지, 테스트 영향 경고,
  문서 커버리지/AC 커버리지 리포트 산출.

acceptance_criteria:
  - id: AC-VL01
    desc: "track-bash-files가 리다이렉트(>) 감지 후 경고"
    testable: "command에 > file 포함 → bash_file_write_detected 이벤트"

  - id: AC-VL02
    desc: "track-bash-files가 파일 조작 없으면 무출력"
    testable: "echo hello → stdout/stderr 비어있음"

  - id: AC-VL03
    desc: "check-side-effects가 소스 변경 시 경고"
    testable: "src/app.js 변경 + tests/ 존재 → source_modified 이벤트"

  - id: AC-VL04
    desc: "check-side-effects가 테스트 파일 변경 무시"
    testable: ".test.mjs 파일 변경 → 이벤트 없음"

  - id: AC-VL05
    desc: "doc-coverage가 spec↔plan 갭 리포트"
    testable: "spec 있고 plan 없는 feature → gaps 배열에 포함"

  - id: AC-VL06
    desc: "doc-coverage가 specs 없으면 skip"
    testable: "specs/ 미존재 → skipped:true"

  - id: AC-VL07
    desc: "check-coverage가 feature별 AC 커버리지 산출"
    testable: "3 AC 중 2 covered → percentage=67"

  - id: AC-VL08
    desc: "check-coverage가 coverage.json 없으면 skip"
    testable: "coverage.json 미존재 → skipped:true"
